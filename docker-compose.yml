services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tp_disenodb
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  mongo-db:
    image: mongo:latest
    container_name: mongo-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  api-app:
    build:
      context: ./TP-DisenoDB
      dockerfile: Dockerfile
    container_name: api-app
    depends_on:
      - mysql-db
      - mongo-db
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - Persistence=MySql # Cambiar a Mongo para usar MongoDB
      - ConnectionStrings__MySql=Server=mysql-db;Database=tp_disenodb;User=root;Password=root;
      - ConnectionStrings__Mongo=mongodb://root:root@mongo-db:27017/?authSource=admin
      - ConnectionStrings__MongoDbName=tp_disenodb

volumes:
  mysql-data:
  mongo-data:
